services:
  spells:
    build:
      context: .
      dockerfile: Dockerfile
    image: spells-web:latest
    container_name: spells-web
    restart: unless-stopped
    # Límites duros — defensa tras incidente 2026-05-25 (un build de spells
    # saturó el VPS al 172% CPU sostenido y disparó throttling de Hostinger).
    # nginx con HTML estático no necesita más de 128 MB / 0.5 CPU.
    # El BUILD ya no se hace en VPS — se hará en GH Actions con imagen
    # publicada a GHCR (TODO próxima iteración).
    mem_limit: 256m
    cpus: 0.5
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.spells.rule=Host(`spells.startidea.tech`)
      - traefik.http.routers.spells.entrypoints=websecure
      - traefik.http.routers.spells.tls=true
      - traefik.http.routers.spells.tls.certresolver=letsencrypt
      - traefik.http.services.spells.loadbalancer.server.port=80

networks:
  coolify:
    external: true
