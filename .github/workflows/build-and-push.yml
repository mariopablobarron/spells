name: Build & push image a GHCR

# En lugar de construir la imagen en el VPS (lo que disparó el incidente
# del 25-may por saturación de CPU), construimos aquí en GH Actions y
# publicamos a GitHub Container Registry. El VPS solo hace 'docker pull'.

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch: {}

concurrency:
  group: build-spells
  cancel-in-progress: true # canceler builds en curso si llegan commits nuevos

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      packages: write # GHCR push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          # latest + sha — el VPS pinea a :latest, opcionalmente rollback con :sha
          tags: |
            ghcr.io/${{ github.repository_owner }}/spells:latest
            ghcr.io/${{ github.repository_owner }}/spells:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Linux amd64 (VPS Hostinger es x86)
          platforms: linux/amd64
