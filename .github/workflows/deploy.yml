name: Deploy a producción (spells.startidea.tech)

# Cada push a main dispara un deploy. La SSH key dedicada vive en el
# secret `VPS_SSH_KEY` y está restringida con `command="/root/deploy-spells.sh"`
# en authorized_keys del VPS → solo puede ejecutar ese script, no comandos
# arbitrarios. Patrón idéntico al de startidea-merch.

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch: {}

concurrency:
  group: deploy-spells
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + build + recreate
    runs-on: ubuntu-latest
    # 15 min: el build de Astro en este VPS compartido tarda 3-7 min según
    # carga concurrente. Healthcheck con retry suma ~80s más. 15 min da margen.
    timeout-minutes: 15
    steps:
      - name: Deploy via OpenSSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa 72.61.195.108 2>/dev/null > ~/.ssh/known_hosts

          # El SSH command-restriction hará que se ejecute /root/deploy-spells.sh
          # sin necesidad de pasarlo aquí. El argumento ":" es no-op.
          ssh -i ~/.ssh/id_ed25519 \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o BatchMode=yes \
              root@72.61.195.108 \
              ":"
